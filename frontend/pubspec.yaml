name: ev_connect_india
description: EV Charging Station Finder App for India
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.0

  # Firebase
  firebase_core: ^2.31.0
  firebase_auth: ^4.19.5
  google_sign_in: ^6.2.1

  # Location
  geolocator: ^11.1.0
  geocoding: ^2.2.0

  # HTTP & Networking
  http: ^1.2.1
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.2
  connectivity_plus: ^6.0.3

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.2.3

  # UI Utilities
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1

  # Sharing
  share_plus: ^9.0.0
  url_launcher: ^6.2.6

  # Widgets & Helpers
  intl: ^0.19.0
  equatable: ^2.0.5
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  auto_size_text: ^3.0.0
  badges: ^3.1.2
  flutter_rating_bar: ^4.0.1
  flutter_phoenix: ^1.1.1
  flutter_local_notifications: ^17.2.1+2
  flutter_map: ^8.3.0
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.3
  very_good_analysis: ^5.1.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
